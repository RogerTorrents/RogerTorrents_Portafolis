<div class="window-wrapper" [class.maximized]="state()?.state === 'maximized'" [class.active]="state()?.active" [style.left.px]="state()?.x" [style.top.px]="state()?.y" [style.width.px]="state()?.width" [style.height.px]="state()?.height" [style.zIndex]="state()?.z" [style.display]="state()?.visible ? 'block' : 'none'">
  <div class="window-header" (pointerdown)="onHeaderPointerDown($event)" (dblclick)="maximize()">
    <div class="title">{{ state()?.title ?? title }}</div>
    <div class="controls">
      <button aria-label="Minimitzar" title="Minimitzar" (click)="minimize(); $event.stopPropagation()">&#x2015;</button>
      <button aria-label="Maximitzar" title="Maximitzar" (click)="maximize(); $event.stopPropagation()">&#9723;</button>
      <button class="btn-tancar" aria-label="Tancar" title="Tancar" (click)="close(); $event.stopPropagation()">&#10005;</button>
    </div>
  </div>
  <div class="window-content">
    <ng-content></ng-content>
  </div>
  <div class="resize-handle resize-n" (pointerdown)="onResizePointerDown($event, 'n')"></div>
  <div class="resize-handle resize-s" (pointerdown)="onResizePointerDown($event, 's')"></div>
  <div class="resize-handle resize-e" (pointerdown)="onResizePointerDown($event, 'e')"></div>
  <div class="resize-handle resize-w" (pointerdown)="onResizePointerDown($event, 'w')"></div>
  <div class="resize-handle resize-nw" (pointerdown)="onResizePointerDown($event, 'nw')"></div>
  <div class="resize-handle resize-ne" (pointerdown)="onResizePointerDown($event, 'ne')"></div>
  <div class="resize-handle resize-sw" (pointerdown)="onResizePointerDown($event, 'sw')"></div>
  <div class="resize-handle resize-se" (pointerdown)="onResizePointerDown($event, 'se')"></div>
</div>
