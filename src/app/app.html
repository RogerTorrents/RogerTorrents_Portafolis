<!-- Main application shell: OS-style UI.
     Placeholder content removed per request. See .context/os-shell for styles and behaviors. -->

<app-voronoi-fons></app-voronoi-fons>

@if (lock()) {
  <app-lock-screen (unlock)="unlock()"></app-lock-screen>
}
@if (!lock()) {
  <app-desktop></app-desktop>
  <app-taskbar (reiniciar)="bloquejar()"></app-taskbar>
  <!-- Window wrappers for apps (registered with WindowManagerService) -->
  @if (wm.muntades().has('sobre-mi')) {
    <app-window-wrapper id="sobre-mi" [title]="ts.t('app_sobre_mi')" [initialMaximized]="true">
      <iframe src="http://localhost:4201" title="Sobre Mi"></iframe>
    </app-window-wrapper>
  }
  @if (wm.muntades().has('habilitats')) {
    <app-window-wrapper id="habilitats" [title]="ts.t('app_habilitats')">
      <iframe src="http://localhost:4202" title="Habilitats"></iframe>
    </app-window-wrapper>
  }
  @if (wm.muntades().has('contactar')) {
    <app-window-wrapper id="contactar" [title]="ts.t('app_contactar')">
      <iframe src="http://localhost:4203" title="Contactar"></iframe>
    </app-window-wrapper>
  }
  @if (wm.muntades().has('fons-depantalla')) {
    <app-window-wrapper id="fons-depantalla" [title]="ts.t('app_fons_depantalla')" [initialWidth]="460" [initialHeight]="640" [initialY]="60">
      <app-fons-depantalla></app-fons-depantalla>
    </app-window-wrapper>
  }
  @if (wm.muntades().has('linkedin')) {
    <app-window-wrapper id="linkedin" [title]="ts.t('app_linkedin')" [initialWidth]="360" [initialHeight]="420">
      <app-linkedin></app-linkedin>
    </app-window-wrapper>
  }
}

<router-outlet />
